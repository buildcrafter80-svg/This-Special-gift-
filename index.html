<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thank You Card</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(45deg,#ff9a9e,#fad0c4);
  font-family: Arial;
  perspective:1000px;
  overflow:hidden;
}

.card{
  width:320px;
  height:200px;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 1s;
  cursor:pointer;
}

.card.flip{
  transform: rotateY(180deg);
}

.side{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  border-radius:15px;
  font-size:22px;
  padding:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.front{
  background:white;
}

.back{
  background:#66a6ff;
  color:white;
  transform: rotateY(180deg);
}

/* Confetti */
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation: fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

.small-footer{
  position:fixed;
  bottom:10px;
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<div class="card" onclick="flipCard()" id="card">
  
  <div class="side front">
    🙌 Scan karne ke liye Thank You! <br><br>
    Card dabao 🎁
  </div>
  
  <div class="side back">
    <div id="message"></div>
  </div>

</div>

<div class="small-footer">
  Gaming Playz18
</div>

<script>

var compliments = [
"😎 Aap itne handsome ho ki camera bhi sharma jaaye!",
"👑 Lagta hai king khud scan kar raha hai!",
"✨ Aapki smile hi sabse bada gift hai!",
"💎 Itne stylish ho ki fashion bhi notes le!",
"🔥 Aap real life superstar ho!"
];

function flipCard(){
  document.getElementById("card").classList.add("flip");
  
  var random = compliments[Math.floor(Math.random()*compliments.length)];
  document.getElementById("message").innerHTML = random;

  launchConfetti();
}

function launchConfetti(){
  for(let i=0;i<50;i++){
    let conf = document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.backgroundColor=
      "hsl(" + Math.random()*360 + ",100%,50%)";
    conf.style.animationDuration = (2 + Math.random()*2) + "s";
    document.body.appendChild(conf);

    setTimeout(()=>{ conf.remove(); },4000);
  }
}

</script>

</body>
</html>
